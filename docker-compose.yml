version: '3.8'

services:
  #PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: finance-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: whatulookingfor
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# Data persistency
volumes:
  postgres_data:
  redis_data: