name: Spring Boot CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: whatulookingfor
          POSTGRES_DB: finance_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Secret Scan (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: License Check (Anti-GPL)
      run: |
        mvn org.codehaus.mojo:license-maven-plugin:2.4.0:aggregate-add-third-party -Dlicense.excludedScopes=test -q
        if grep -Eqi "GPL|AGPL" target/generated-sources/license/THIRD-PARTY.txt; then
          echo "GPL/AGPL licensed dependency detected:"
          grep -Ei "GPL|AGPL" target/generated-sources/license/THIRD-PARTY.txt
          exit 1
        fi
        echo "No GPL/AGPL dependencies detected."

    - name: Build and Test with Maven
      env:
        DB_URL: jdbc:postgresql://localhost:5432/finance_db
        DB_USERNAME: postgres
        DB_PASSWORD: whatulookingfor
        JWT_SECRET: super_secret_test_key_for_github_actions_only
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
      run: mvn clean verify

  codeql:
      name: Static Application Security Testing (CodeQL)
      runs-on: ubuntu-latest
      permissions:
        security-events: write
        contents: read
      steps:
        - uses: actions/checkout@v4
        - uses: github/codeql-action/init@v3
          with:
            languages: java
        - name: Build for CodeQL
          run: mvn -B clean compile -DskipTests
        - uses: github/codeql-action/analyze@v3